name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Repository checks
        run: bash scripts/check_repo.sh
